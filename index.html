<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ff00aa, #4400ff, #00ffcc, #ff6600);
            background-size: 400% 400%;
            animation: bgShift 12s infinite alternate ease-in-out;
            font-family: 'Courier New', monospace;
            padding: 2rem;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; filter: hue-rotate(0deg) blur(0px);}
            25% { background-position: 50% 100%; filter: hue-rotate(30deg) blur(1px);}
            50% { background-position: 100% 50%; filter: hue-rotate(180deg) blur(0.5px);}
            75% { background-position: 0% 100%; filter: hue-rotate(270deg) blur(1.2px);}
            100% { background-position: 100% 0%; filter: hue-rotate(360deg) blur(0px);}
        }

        /* кислотный шум поверх */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, 
                rgba(255,0,200,0.15) 0px,
                rgba(0,255,255,0.15) 3px,
                rgba(255,255,0,0.15) 6px,
                rgba(0,255,128,0.15) 9px);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
            animation: noiseShift 0.15s infinite steps(4);
        }

        @keyframes noiseShift {
            0% { transform: translate(0,0);}
            100% { transform: translate(5px, -3px);}
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            backdrop-filter: blur(8px) brightness(1.1);
            border-radius: 80px 20px 80px 20px;
            animation: containerWobble 6s infinite alternate;
        }

        @keyframes containerWobble {
            0% { border-radius: 80px 20px 80px 20px; transform: rotate(0deg);}
            50% { border-radius: 30px 80px 30px 80px; transform: rotate(0.5deg);}
            100% { border-radius: 80px 20px 80px 20px; transform: rotate(-0.5deg);}
        }

        /* ТВОЙ ЗАГОЛОВОК */
        h1 {
            font-size: 4rem;
            text-align: center;
            font-weight: bold;
            font-family: 'Impact', 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffff00, #ff00ff, #00ffff, #ff4400, #ffff00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textFlow 3s infinite, textShake 0.2s infinite;
            text-shadow: 0 0 20px magenta, 0 0 30px cyan;
            margin-bottom: 3rem;
            word-break: break-word;
        }

        @keyframes textFlow {
            0% { background-position: 0% 50%;}
            50% { background-position: 100% 50%;}
            100% { background-position: 0% 50%;}
        }

        @keyframes textShake {
            0% { transform: translate(1px, -1px) rotate(0.3deg);}
            100% { transform: translate(-1px, 1px) rotate(-0.3deg);}
        }

        /* Место для твоих мыслей — чистый блок, ничего лишнего */
        .diary-space {
            min-height: 60vh;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 2rem;
            color: #fff;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 50px rgba(255,0,200,0.3), 0 0 30px cyan;
            border: 2px solid rgba(255,255,255,0.3);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            0% { box-shadow: inset 0 0 30px magenta, 0 0 20px cyan; border-color: rgba(255,0,200,0.5);}
            100% { box-shadow: inset 0 0 70px cyan, 0 0 50px magenta; border-color: rgba(0,255,255,0.8);}
        }

        /* просто для того, чтобы писать было видно */
        .diary-space p {
            margin: 1rem 0;
            text-shadow: 0 0 5px black;
        }

        /* летающие орбы */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,200,0.4), rgba(0,255,255,0));
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: float 18s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); opacity: 0.4;}
            100% { transform: translate(200px, 150px) scale(1.8); opacity: 0.8;}
        }

        .orb1 { width: 400px; height: 400px; top: -150px; left: -150px; animation-duration: 14s; background: #ff00cc66;}
        .orb2 { width: 600px; height: 600px; bottom: -250px; right: -200px; animation-duration: 20s; background: #00ffcc66;}
        .orb3 { width: 300px; height: 300px; top: 40%; left: 70%; animation-duration: 11s; background: #ffff0066;}
        .orb4 { width: 250px; height: 250px; top: 70%; left: 10%; animation-duration: 17s; background: #ff660066;}
    </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>

<div class="container">
    <!-- ТОЛЬКО ТВОЙ ЗАГОЛОВОК -->
    <h1>Это мой дневник<br>с моими глупенькими мыслями!</h1>
    
    <!-- А здесь ты сам пишешь свои мысли — я не трогаю -->
    <div class="diary-space">
        <!-- Пиши что хочешь, я ничего не добавляю -->
    </div>
</div>

</body>
</html>

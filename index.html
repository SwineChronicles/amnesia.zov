<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>дневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        /* Красная дрожащая надпись */
        h1 {
            color: red;
            font-size: 4rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            animation: shake 0.08s infinite;
            text-shadow: 0 0 5px red, 0 0 10px darkred;
        }

        @keyframes shake {
            0% { transform: translate(1px, -1px) rotate(0.2deg); }
            25% { transform: translate(-1px, 1px) rotate(-0.2deg); }
            50% { transform: translate(2px, 0px) rotate(0.1deg); }
            75% { transform: translate(-2px, -1px) rotate(-0.3deg); }
            100% { transform: translate(1px, 1px) rotate(0.2deg); }
        }

        /* можно добавить совсем лёгкое мерцание, но без бреда */
        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 2px red; }
            50% { opacity: 0.95; text-shadow: 0 0 8px red, 0 0 12px darkred; }
            100% { opacity: 1; text-shadow: 0 0 2px red; }
        }

        h1 {
            animation: shake 0.08s infinite, flicker 0.3s infinite alternate;
        }
    </style>
</head>
<body>
    <h1>Это мой дневник<br>с моими глупенькими мыслями!</h1>
</body>
</html>
